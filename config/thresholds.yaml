# BrightMatter detector thresholds.
#
# Every threshold MUST cite a research source. If you can't cite it, don't add it.
# Re-run `python -m brightmatter validate <detector>` after any change to confirm
# the thresholds still produce defensible signals.
#
# Schema:
#   detectors.<key>.defaults       — flat dict of threshold values
#   detectors.<key>.sources        — list of {threshold, value, rationale, source}
#                                    (one entry per non-trivial threshold; ground every
#                                    number in research or harness evidence)
#   detectors.<key>.overrides      — list of {when, <overridden values>, rationale, source}
#                                    `when` matches on business_type / spend_tier;
#                                    overridden values replace defaults for matching accounts

version: 1
last_reviewed: 2026-05-10

detectors:

  brand_nonbrand_contamination:
    description: >
      Account-level blended ROAS hides poor non-brand performance. Identifies
      accounts where strong brand-search performance is masking a structurally
      unprofitable non-brand campaign. NOTE: this is a structural decomposition
      of a weighted average, not a causal claim — see research/patterns for
      why the "mask" framing can mislead when brand ROAS is implausibly high.

    defaults:
      window_days: 30
      min_brand_cost_30d: 100
      min_nonbrand_cost_30d: 100
      min_brand_conversions_30d: 10
      min_nonbrand_conversions_30d: 10
      brand_roas_min: 10
      brand_roas_max: 25
      nonbrand_roas_max: 2.0
      blended_roas_min: 5
      brand_token_match_pct_min: 0.30

    sources:
      - threshold: min_brand_cost_30d
        value: 100
        rationale: >
          Minimum spend floor to ensure ROAS arithmetic is meaningful.
          Below $100/30d, single-conversion noise dominates.
        source: implementation default (legacy detector)

      - threshold: min_nonbrand_conversions_30d
        value: 10
        rationale: >
          With fewer than 10 conversions in 30 days, ROAS estimates are
          dominated by statistical noise. Roadway AI / Digital4Startups
          consensus is 30 conversions/month for reliable bid optimization;
          we use 10 as a softer floor below which a "low non-brand ROAS"
          claim is indistinguishable from random variance.
        source: research/benchmarks/industry-benchmarks.md (Smart Bidding Transition Thresholds, Roadway AI 30/month minimum)

      - threshold: brand_roas_max
        value: 25
        rationale: >
          Brand ROAS above 25x in ecommerce is implausible without conversion-value
          inflation (offline imports, LTV blending, double-counting). Vallaeys
          (Tier 1) notes 47% of stuck Smart Bidding campaigns trace to broken
          conversion tracking. Above this ceiling, the brand-vs-nonbrand gap is
          partly an attribution artifact rather than real campaign contamination.
          Confirmed by harness disconfirmation 2026-05-10 (MacKenzie-Childs:
          brand_roas=40.9x, only 21 nonbrand conversions, claim was unsafe).
        source: research/experts/tier1-expert-frameworks.md (Vallaeys conversion-tracking incidence); harness audit 2026-05-10

      - threshold: nonbrand_roas_max
        value: 2.0
        rationale: >
          Non-brand ROAS below 2x is the "underperformance" half of the
          contamination claim. Lolk and Geddes both treat 2x as the rough
          break-even line for non-brand search after factoring margin and CAC.
        source: research/experts/tier1-expert-frameworks.md (Lolk profitability framework, Geddes structural rules)

      - threshold: blended_roas_min
        value: 5
        rationale: >
          Blended ROAS above 5x while non-brand sits below 2x is the
          definitional "masking" condition. Aaron Levy's diminishing-returns
          framework explicitly calls out blended ROAS as the metric most
          likely to hide marginal-spend losses.
        source: research/benchmarks/industry-benchmarks.md (Aaron Levy diminishing-returns framework)

      - threshold: brand_token_match_pct_min
        value: 0.30
        rationale: >
          Campaign-name heuristics (LIKE '%brand%') misfire on competitor-defense
          campaigns and brand-misspelling campaigns. If a campaign labeled "brand"
          has fewer than 30% of its keywords containing actual brand tokens, the
          label is unreliable and the contamination claim cannot be made.
          Geddes ranks match-type/naming contamination as the #1 structural flaw.
        source: research/experts/tier1-expert-frameworks.md (Geddes naming/match-type contamination, Lolk SQR primacy)

    overrides:
      - when:
          business_type: local
        nonbrand_roas_max: 0.5
        rationale: >
          Local services (plumbing, dental, HVAC) draw 75-85% of paid revenue
          from brand search. Non-brand campaigns in this vertical are
          discovery/awareness, not the profit center. A 1.5x non-brand ROAS
          here is normal, not pathological — only fire when non-brand is
          genuinely below break-even (<0.5x).
        source: research/experts/tier2-expert-insights.md (Lolk local-services brand dominance)

      - when:
          business_type: lead_gen
        skip: true
        rationale: >
          Lead-gen accounts often track form fills without conversion_value.
          ROAS-based contamination detection is meaningless without revenue
          attribution. Skip until a CPA-based variant is implemented.
        source: research/benchmarks/industry-benchmarks.md (CVR/CPL framework; lead gen lacks revenue)


  # ───────────────────────────────────────────────────────────────────────
  # Detectors below are wired to read from YAML defaults only (Phase 1A).
  # Vertical/tier overrides come in Phase 1B once benchmark data is embedded.
  # ───────────────────────────────────────────────────────────────────────

  budget_limited_is:
    description: >
      Search campaign losing >35% impression share to budget over the last 7
      days with meaningful spend. Implicit claim: more budget would mean
      more conversions. Harness disconfirms when rank-loss dominates,
      conversion volume is too low, or budget is intentionally throttled.
    defaults:
      window_days: 7
      avg_budget_lost_is_min: 0.35
      total_cost_micros_min: 500000000  # $500 over the 7-day window
      min_conv_in_window: 5
    sources:
      - threshold: avg_budget_lost_is_min
        value: 0.35
        rationale: >
          Industry consensus: budget-lost-IS > 20% means the campaign is
          throttling itself. We use 0.35 as a stricter "definitely material"
          line consistent with pattern-detection-logic.md domain 3.
        source: research/patterns/pattern-detection-logic.md (Impression Share / Budget Pressure)
      - threshold: total_cost_micros_min
        value: 500000000
        rationale: >
          $500 floor over 7 days ensures the IS metric is computed on
          enough impressions to be reliable.
        source: implementation default (legacy detector)
      - threshold: min_conv_in_window
        value: 5
        rationale: >
          The signal's implicit claim is "more budget would mean more
          conversions." That's unverifiable on a campaign with almost no
          conversions, so the disconfirmation harness (T3) rejects it below
          5 conv in the 7-day window. Gate the detector at the same floor so
          it doesn't recommend scaling budget where uplift can't be claimed.
          Validated: removed the harness's T3-disconfirm signals, moving the
          detector REVISE->MONITOR on the 2026-05-09 snapshot.
        source: harness T3 (validation/budget_limited.py) volume-sufficiency floor
    overrides:
      - when:
          business_type: nonprofit
        skip: true
        confidence: prior
        rationale: |
          Google Ad Grants operate under a $10K/month cap, $2.00 max CPC,
          and a 5% minimum CTR — all REGULATORY constraints. A grant
          account losing IS to budget is hitting Google's cap, not its
          own. The "more budget would mean more conversions" claim is
          meaningless when budget is externally fixed.
        source: research/benchmarks/industry-benchmarks.md (Google Ad Grants constraints)
        revisit: |
          When we add a `grant_budget_capped_at_ceiling` signal type that
          fires only when the grant's $10K cap is the active constraint,
          remove this skip and route grant accounts through the new
          detector instead.

  cvr_drop:
    description: >
      Campaign CVR dropped >30% week-over-week with sufficient volume both
      weeks. Harness disconfirms when tracking changed, campaign config
      shifted mid-period, or prior week was an outlier (regression to mean).
    defaults:
      current_window_days: 7
      prior_window_days: 7
      cvr_drop_ratio: 0.7        # current < prior * 0.7  (a 30% drop)
      prior_clicks_min: 100
      current_clicks_min: 100
      prior_conv_min: 10
      prior_cvr_min: 0.01        # prior CVR > 1% to suppress noise
    sources:
      - threshold: cvr_drop_ratio
        value: 0.7
        rationale: >
          A 30% week-over-week CVR drop is the threshold expert audits use
          to flag "investigate" (landing page, tracking, or competitive
          changes). Geddes/Vallaeys both reference this cadence.
        source: research/patterns/pattern-detection-logic.md (CVR Anomalies)
      - threshold: prior_conv_min
        value: 10
        rationale: >
          Below 10 conversions in a week, the CVR delta is dominated by
          noise. Roadway AI uses ≥30/month for reliable bid optimization;
          10/week is a softer floor for anomaly detection.
        source: research/benchmarks/industry-benchmarks.md (Roadway AI thresholds)
    overrides: []

  cvr_change:
    description: >
      Bidirectional rolling-period delta companion to cvr_drop. Same 7d-vs-7d
      windows, but fires on movement in either direction at a 15% relative
      delta. Lower CVR floor than parent (0.5% vs 1%) so we catch movement
      in mid-funnel campaigns the parent suppresses. Independent from
      cvr_drop: a sharp drop fires both signals (state + change); a milder
      drop or an improvement fires only this one.
    defaults:
      window_days: 7
      min_pct_delta: 0.15
      min_current_clicks: 50
      min_prior_clicks: 50
      min_prior_conv: 5
      min_prior_cvr: 0.005
      max_single_day_click_share: 0.5
    sources:
      - threshold: window_days
        value: 7
        rationale: >
          Matches the parent cvr_drop window for apples-to-apples comparison.
          Changing this also requires changing cvr_drop.current_window_days
          and cvr_drop.prior_window_days.
        source: implementation default (mirrors parent detector)
      - threshold: max_single_day_click_share
        value: 0.5
        rationale: >
          Drop the signal when one day holds >50% of a window's clicks: the
          CVR for that window is then one observation, and a delta against it
          is noise/mean-reversion, not a real shift. Mirrors harness T4
          (single-day click dominance) and the cpa_spike single-day-share
          gate. Validated: removed the lone false positive (TIGHTEN->MONITOR)
          on the 2026-05-09 snapshot — a campaign whose prior week was a
          single-day low outlier.
        source: harness T4 (validation/cvr_drop.py single-day dominance)
      - threshold: min_pct_delta
        value: 0.15
        rationale: >
          Half the parent's 30% threshold — surfaces earlier movement
          before it crosses the cvr_drop "investigate" line. 15% is roughly
          2x the day-to-day Poisson noise on CVR at the volume floors below,
          so single-week 15%+ movement is unlikely to be pure variance.
        source: implementation default
        confidence: prior
        revisit: >
          If too noisy, raise to 0.20. If real early shifts are missed,
          lower to 0.10 — but verify by spot-checking signals at that level
          before relaxing further.
      - threshold: min_prior_clicks
        value: 50
        rationale: >
          Half the parent's 100-click floor — we want broader coverage for
          earlier-warning movement, accepting slightly noisier signals.
          Below 50 clicks per week, CVR rates are statistically thin.
        source: implementation default (relaxed from parent cvr_drop.prior_clicks_min)
        confidence: prior
        revisit: if change-signals fire too often on thin-volume campaigns
      - threshold: min_current_clicks
        value: 50
        rationale: >
          Mirror of min_prior_clicks for the current window. Both windows
          need volume for a CVR comparison to be meaningful.
        source: implementation default (relaxed from parent cvr_drop.current_clicks_min)
      - threshold: min_prior_conv
        value: 5
        rationale: >
          Half the parent's 10-conv floor. Below 5 prior-week conversions,
          the prior CVR is too noisy as a baseline for the delta math.
        source: implementation default (relaxed from parent cvr_drop.prior_conv_min)
        confidence: prior
        revisit: if low-conv accounts produce a wave of unreliable signals
      - threshold: min_prior_cvr
        value: 0.005
        rationale: >
          Half the parent's 1% floor. Allows mid-funnel/awareness campaigns
          (whose CVRs run lower) to participate. Below 0.5% CVR, weekly
          movement is mostly variance and not worth surfacing as a change.
        source: implementation default (relaxed from parent cvr_drop.prior_cvr_min)
    overrides: []

  cpa_change:
    description: >
      Bidirectional rolling-period delta companion to cpa_spike. Uses
      EQUAL 7d-vs-7d windows (vs cpa_spike's unequal 7d/8-30d comparison)
      at a 25% bidirectional delta. The "slow drift" view to pair with
      cpa_spike's "sharp departure from normal baseline" view. Inherits
      the same noise pre-filters that protect cpa_spike (recent-conv floor,
      multi-day activity, no single-day-dominated windows) on BOTH sides
      of the comparison.
    defaults:
      window_days: 7
      min_pct_delta: 0.25
      min_conv_per_window: 5
      min_active_days: 3
      max_single_day_share: 0.50
    sources:
      - threshold: window_days
        value: 7
        rationale: >
          Mirror of cpa_spike.recent_window_days. Using equal 7d-vs-7d
          (instead of cpa_spike's 7d-vs-baseline) is what makes this a
          distinct signal — it surfaces gradual drift rather than sharp
          departures from a longer baseline.
        source: implementation default
      - threshold: min_pct_delta
        value: 0.25
        rationale: >
          25% week-over-week is the inflection for CPA where movement
          stops being auction-variance noise. Note: cpa_spike's 3x (200%)
          threshold catches sharp spikes; this catches gradual drift well
          below that line in both directions.
        source: implementation default
        confidence: prior
        revisit: >
          If too noisy, tighten to 0.35. If real early drift is missed,
          loosen to 0.20.
      - threshold: min_conv_per_window
        value: 5
        rationale: >
          Same floor as the harness's cpa_spike T1 (and the tightened
          recent_conv_min on cpa_spike). Below 5 conversions per window
          the CPA is dominated by sampling noise. Required on BOTH windows
          since the delta is computed from both CPA estimates.
        source: implementation default (mirrors cpa_spike.recent_conv_min)
        confidence: prior
      - threshold: min_active_days
        value: 3
        rationale: >
          Same multi-day-activity guard as cpa_spike.recent_active_days_min.
          A CPA computed from one day's data isn't a trend. Required on
          BOTH windows.
        source: implementation default (mirrors cpa_spike.recent_active_days_min)
        confidence: prior
      - threshold: max_single_day_share
        value: 0.50
        rationale: >
          Mirrors cpa_spike.max_single_day_share_max. Any window where
          one day accounts for >50% of spend has too much leverage from
          a single observation. Currently enforced on the CURRENT window
          only (mirroring the parent); applying it to the prior window
          too is plausible but would shrink the cohort further.
        source: implementation default (mirrors cpa_spike.max_single_day_share_max)
        confidence: prior
        revisit: >
          If improving-direction signals turn out to be dominated by a
          single big prior-window day, extend this guard to the prior side.
    overrides: []

  cpa_spike:
    description: >
      Recent (7-day) CPA exceeds 3x the 30-day baseline with sufficient
      conversions AND multi-day activity to back the claim. The recent
      window must have ≥5 conversions, activity on ≥3 distinct days, and
      no single day accounting for >50% of weekly spend — otherwise the
      "spike" is a sampling artifact, not a real degradation. Harness
      additionally disconfirms when bidding strategy was changed mid-period
      or AOV rose proportionally (higher CPA buys higher-value conversions).
    defaults:
      recent_window_days: 7
      baseline_window_days: 30   # 8-30 days back from today
      recent_cpa_multiplier: 3.0
      recent_conv_min: 5
      baseline_conv_min: 3
      recent_active_days_min: 3
      max_single_day_share_max: 0.50
    sources:
      - threshold: recent_cpa_multiplier
        value: 3.0
        rationale: >
          A 3x spike is the standard "this is real, not noise" line in
          most audit frameworks. Smaller multiples generate too much false
          signal in low-volume campaigns.
        source: research/patterns/pattern-detection-logic.md (CPA Spikes)
      - threshold: recent_conv_min
        value: 5
        rationale: >
          Raised from 1 → 5 on 2026-05-16 after harness disconfirmation
          (0/6 on T1 Recent-week volume reliability). The harness's T1
          fires "noise-dominated" below 5 conversions; the detector must
          enforce the same floor before firing. With <5 recent conversions
          a "CPA spike" is statistically indistinguishable from sampling
          noise around the baseline.
        source: harness audit 2026-05-16 (cpa_spike T1 disconfirmation rate)
        confidence: prior
        revisit: >
          If a 30-day run produces 0 cpa_spike signals across the active
          cohort, consider lowering to 3 — but only after first relaxing
          recent_active_days_min, since multi-day activity is a stronger
          guarantee of reliability than raw conversion count.
      - threshold: recent_active_days_min
        value: 3
        rationale: >
          Added 2026-05-16 in response to harness audit — all 6 signals
          in the prior run had spend on only one day of the 7-day window.
          A "CPA spike" computed against one day of activity isn't a trend,
          it's a single observation. Requiring 3 of 7 days with spend
          ensures the recent-window CPA averages over at least three
          observations.
        source: harness audit 2026-05-16 (cpa_spike T2 disconfirmation rate)
        confidence: prior
        revisit: >
          If the detector under-fires, try 2 before lowering further.
          Lowering below 2 effectively reverts to the pre-fix behavior.
      - threshold: max_single_day_share_max
        value: 0.50
        rationale: >
          Added 2026-05-16. Mirrors the harness's T2 single-day-outlier
          test promoted from disconfirmation to pre-filter. Any recent
          window where one day accounts for >50% of spend has too much
          single-day leverage on the CPA average to call the change a
          trend. T2 used the same 0.50 cutoff and disconfirmed 6/6 prior
          signals — by gating at the detector, we never produce signals
          that T2 would immediately disconfirm.
        source: harness audit 2026-05-16 (cpa_spike T2 disconfirmation rate)
        confidence: prior
        revisit: >
          If the detector under-fires, try 0.60 before relaxing further.
          0.50 corresponds to "one day is the median of the rest combined."
    overrides: []

  budget_capped:
    description: >
      Campaign averaged >30% IS lost to budget across 7+ days of the last
      14. Weaker than budget_limited_is — it's an observation, not a
      recommendation. Harness disconfirms when actual budget utilization
      is low (cap is nominal, not binding) or rank-loss dominates.
    defaults:
      window_days: 14
      avg_budget_lost_is_min: 0.30
      min_days_capped: 7
      min_conv_in_window: 15
    sources:
      - threshold: avg_budget_lost_is_min
        value: 0.30
        rationale: >
          Slightly softer than budget_limited_is (0.35) because this signal
          fires when a campaign is consistently *capped*, not necessarily
          starved. 30% is the inflection per pattern-detection-logic.md.
        source: research/patterns/pattern-detection-logic.md (Budget Constraints)
      - threshold: min_days_capped
        value: 7
        rationale: >
          Half the 14-day window. Below this, the "consistently" framing
          isn't earned.
        source: implementation default
      - threshold: min_conv_in_window
        value: 15
        rationale: >
          A budget cap only matters if uncapping would yield meaningful
          additional conversions, so the harness (T3) only deems the claim
          meaningful at 15+ conv over the window. NOTE: the harness's primary
          confirming test (T1, actual spend-vs-budget utilization) is
          currently DEAD because daily_budget_micros is ingested as all
          zeros — so a budget-data ingestion gap, not detector quality, is
          why this detector leans on T3. Until budget amounts are ingested,
          gate at the T3 meaningfulness bar (15) so firing signals rest on a
          test that can actually run.
        source: harness T3 (validation/budget_capped.py) + daily_budget_micros ingestion gap
    overrides:
      - when:
          business_type: nonprofit
        skip: true
        confidence: prior
        rationale: |
          Same reason as budget_limited_is: grant accounts are capped by
          policy, not by the advertiser's budget choices.
        source: research/benchmarks/industry-benchmarks.md (Google Ad Grants)
        revisit: when grant-specific detector exists

  budget_limited_is_change:
    description: >
      Rolling-period delta companion to budget_limited_is. Compares the most
      recent 7d avg(search_budget_lost_is) against the prior 7d avg. Fires
      when the two periods differ by ≥10 percentage points — direction
      (worsening vs. improving) carried in the signal data. Independent
      from budget_limited_is: change fires on movement regardless of
      absolute level; state fires on persistent absolute level regardless
      of change.
    defaults:
      window_days: 7
      min_delta_pp: 0.10
      min_days_with_data: 5
      min_cost_micros: 250000000  # $250 over the 7-day window
    sources:
      - threshold: window_days
        value: 7
        rationale: >
          Matches the parent budget_limited_is window for apples-to-apples
          comparison. Changing this also requires changing the parent.
        source: implementation default (mirrors parent detector)
      - threshold: min_delta_pp
        value: 0.10
        rationale: >
          10 percentage points is the inflection where week-over-week
          shifts stop being noise. Auction variance alone produces ±5pp
          routinely; ±10pp signals a real shift. Matches budget_capped_change.
        source: implementation default
        confidence: prior
        revisit: >
          If too noisy, tighten to 0.15. If real early-warning shifts are
          missed, loosen to 0.07 — but only after verifying we're not
          smoothing over normal auction variance.
      - threshold: min_days_with_data
        value: 5
        rationale: >
          ≥5 of the 7 days need valid budget_lost_is for the average to be
          meaningful. Below this, the delta is computed against too little
          data to be trusted.
        source: implementation default
        confidence: prior
        revisit: if we observe change-signals firing on sparse data
      - threshold: min_cost_micros
        value: 250000000
        rationale: >
          $250 floor (half the state-detector's $500) — relaxed so we
          still catch campaigns whose spend was reduced but is still
          meaningful. Avoids firing on dead campaigns where IS-lost
          changes are an artifact of having no impressions.
        source: implementation default (derived from budget_limited_is.total_cost_micros_min)
    overrides:
      - when:
          business_type: nonprofit
        skip: true
        confidence: prior
        rationale: |
          Same reason as parent budget_limited_is — grant accounts'
          budget pressure is regulatory, not a marketer choice.
        source: research/benchmarks/industry-benchmarks.md (Google Ad Grants)
        revisit: when grant-specific detector exists

  budget_capped_change:
    description: >
      Rolling-period delta companion to budget_capped. Compares the most
      recent 14d avg(search_budget_lost_is) against the prior 14d avg.
      Fires when the two periods differ by ≥10 percentage points — direction
      (worsening vs. improving) is carried in the signal data. Independent
      from budget_capped: change fires on movement regardless of absolute
      level; state fires on persistent absolute level regardless of change.
      Both can fire together (movement at an already-bad level), neither
      can fire (stable + below threshold), or each alone (state-only =
      stably bad; change-only = trending bad or improving from bad).
    defaults:
      window_days: 14
      min_delta_pp: 0.10
      min_days_with_data: 5
    sources:
      - threshold: window_days
        value: 14
        rationale: >
          Matches the parent budget_capped window so the comparison is
          apples-to-apples (current 14d vs prior 14d). Changing this also
          requires changing budget_capped.window_days.
        source: implementation default (mirrors parent detector)
      - threshold: min_delta_pp
        value: 0.10
        rationale: >
          10 percentage points is the inflection where week-over-week
          shifts in budget-lost-IS stop being noise. Auction variance
          alone produces ±5pp routinely; ±10pp signals a real shift in
          either competitive pressure or campaign budget headroom.
        source: implementation default
        confidence: prior
        revisit: >
          If the cohort generates too many noisy change-signals, tighten
          to 0.15. If real early-warning shifts are missed, loosen to 0.07
          — but only after verifying we're not just smoothing over normal
          auction variance.
      - threshold: min_days_with_data
        value: 5
        rationale: >
          A meaningful avg(budget_lost_is) needs ≥5 days of valid data in
          each window. Below this, a "delta" is one or two days' values
          compared to another one or two — too noisy to compare.
        source: implementation default
        confidence: prior
        revisit: if we observe change-signals firing on sparse data
    overrides: []

  auto_applied_changes:
    description: >
      Account has auto-applied changes from Google's recommendation system
      in the last 30 days. Risk signal — Google's auto-applied changes can
      silently degrade performance. Harness disconfirms when outcomes
      didn't actually move or the changes are too recent to measure.
    defaults:
      window_days: 30
      critical_count: 5     # ≥5 changes = critical, else warning
    sources:
      - threshold: critical_count
        value: 5
        rationale: >
          One or two auto-changes are normal; 5+ in a month indicates
          Google is making sustained structural modifications worth a
          human review (Vallaeys' "Google's defaults quietly drain budget"
          observation).
        source: research/experts/tier1-expert-frameworks.md (Vallaeys)
    overrides: []

  duplicate_primary_conversions:
    description: >
      Account has 2+ ENABLED primary conversion actions IN THE SAME CATEGORY
      (genuine same-goal double-counting) AND shows corroborating inflation:
      implausibly high account CVR or near-zero value-per-conversion. Raw
      count of primaries alone is not enough — distinct-category multi-goal
      tracking is legitimate, and the harness showed same-category dupes
      mostly do NOT inflate measured conversions unless impact is corroborated.
    defaults:
      same_category_min: 2
      inflation_cvr_min: 0.50
      inflation_value_per_conv_max: 1.0
    sources:
      - threshold: same_category_min
        value: 2
        rationale: >
          Two primary actions in ONE category is the actual double-count
          mechanism (e.g. two "Purchase" actions both counting). Distinct
          categories (LEAD + PURCHASE) are legit multi-goal tracking — the
          old count>=3-across-any-category rule fired on those as false
          positives (harness T1). Aligns the detector with harness T1.
        source: harness T1 (validation/duplicate_primary_conversions.py)
      - threshold: inflation_cvr_min
        value: 0.50
        rationale: >
          The signal claims double-counting INFLATES conversions. The harness
          (T2) only confirms when account CVR > 50% (implausibly high). On the
          2026-05-09 snapshot, same-category dupes alone showed normal CVR in
          18/19 accounts — the inflation claim wasn't borne out. Require this
          corroboration so the detector fires only where impact is visible.
        source: harness T2 (CVR plausibility) confirm threshold
      - threshold: inflation_value_per_conv_max
        value: 1.0
        rationale: >
          Alternative corroboration (harness T3): value-per-conversion below
          $1 (with value tracking present) signals junk/duplicate conversions
          carrying no real value. Either this OR the CVR test qualifies.
        source: harness T3 (value-per-conversion plausibility) confirm threshold
    overrides: []

  over_segmentation:
    description: >
      Account has many small campaigns starving for conversion data —
      ≥50% of enabled campaigns get fewer than 30 conv/month despite the
      account having ≥100 total conversions. Harness disconfirms when the
      "starving" campaigns are intentional splits (geo, brand vs non-brand,
      campaign-type).
    defaults:
      window_days: 30
      per_campaign_conv_min: 30
      account_total_conv_min: 100
      account_campaigns_min: 5
      starving_share_min: 0.5
      intentional_geo_share_max: 0.5
      intentional_type_brand_share_max: 0.6
    sources:
      - threshold: per_campaign_conv_min
        value: 30
        rationale: >
          The cross-industry Smart-Bidding minimum: Google + Roadway AI
          + Digital4Startups all converge on 30 conversions/month per
          campaign for reliable optimization.
        source: research/benchmarks/industry-benchmarks.md (Smart Bidding thresholds)
      - threshold: starving_share_min
        value: 0.5
        rationale: >
          A few small campaigns is normal (tests, geo splits). When more
          than half the campaigns starve, consolidation is the structural
          fix per smec/Lolk.
        source: research/experts/tier1-expert-frameworks.md (Lolk consolidation)
      - threshold: intentional_geo_share_max
        value: 0.5
        rationale: >
          Suppress the signal when ≥50% of the starving campaigns are
          geo-named — that's a deliberate geo split, not accidental
          fragmentation. Mirrors harness T1 (intentional geo segmentation).
        source: harness T1 (validation/over_segmentation.py)
      - threshold: intentional_type_brand_share_max
        value: 0.6
        rationale: >
          Suppress when ≥60% of starving campaigns carry campaign-type
          (PMax/Shopping/Search) or brand/non-brand tokens — an intentional
          structure. Mirrors harness T2 (intentional type/brand split).
          Validated: these two gates removed all 3 false positives
          (TIGHTEN->clean) on the 2026-05-09 snapshot (Voomi, 360 Cookware,
          Toggl — all heavily geo/type-named).
        source: harness T2 (validation/over_segmentation.py)
    overrides: []

  insufficient_conversions_for_strategy:
    description: >
      Campaign uses TARGET_CPA or TARGET_ROAS bidding with < 15 conv/month.
      Smart Bidding can't optimize without enough conversion data. Harness
      disconfirms when campaign is paused, the strategy was just changed
      (still ramping), or value/AOV is high enough for tROAS to optimize
      on revenue despite low count.
    defaults:
      window_days: 30
      monthly_conv_min: 15
      min_campaign_age_days: 14
      strategies:
        - TARGET_CPA
        - TARGET_ROAS
    sources:
      - threshold: monthly_conv_min
        value: 15
        rationale: >
          Jyll's transition threshold: <15 conv/month = Maximize
          Conversions (no target); 15-30 = begin tCPA testing; 30+ =
          tCPA reliable. Below 15 the target strategy thrashes.
        source: research/benchmarks/industry-benchmarks.md (Jyll Saskin Gales)
      - threshold: min_campaign_age_days
        value: 14
        rationale: >
          A campaign visible < 2 weeks can't have accumulated a month of
          conversions, so "insufficient conversions for the strategy" isn't
          yet a fair claim — and paused campaigns aren't running the strategy
          at all. The detector now also requires the campaign to be ENABLED a
          majority of the window. Together these mirror harness T1 (active)
          and T4 (age). Validated: removed both false positives (a 1-day
          paused campaign and a 9-day high-value tROAS campaign) on the
          2026-05-09 snapshot, TIGHTEN->clean.
        source: harness T1+T4 (validation/insufficient_conversions.py)
    overrides:
      - when:
          business_type: nonprofit
        skip: true
        confidence: prior
        rationale: |
          Grant accounts have different optimization rules and conversion
          volume expectations than commercial advertisers. The Jyll
          threshold doesn't apply.
        source: research/benchmarks/industry-benchmarks.md (Google Ad Grants)
        revisit: when we add grant-specific bidding pattern detection
      - when:
          business_type: app
        skip: true
        confidence: prior
        rationale: |
          APP campaigns use App-specific bidding strategies (TARGET_CPI,
          TARGET_RETURN_ON_AD_SPEND_APP) — not TARGET_CPA/TARGET_ROAS.
          The detector's SQL filter already excludes them via the
          strategies list, but this override is defense-in-depth.
        source: Google Ads bidding-strategy taxonomy
        revisit: when we add an app-specific volume detector

  pmax_low_conv_volume:
    description: >
      PMax campaign has < 30 conv/month with > $1k spend. PMax Smart
      Bidding needs 30+ conversions to optimize meaningfully. Harness
      disconfirms when the campaign is too new (still ramping), spend
      share is tiny (a test, not the structure), or high AOV makes value
      a usable signal.
    defaults:
      window_days: 30
      monthly_conv_min: 30
      monthly_cost_micros_min: 1000000000  # $1000
      min_campaign_age_days: 21
    sources:
      - threshold: monthly_conv_min
        value: 30
        rationale: >
          Digital4Startups + Google PMax guidance: 50-100/month ideal,
          30 minimum. Below this PMax's signal-to-noise is too low.
        source: research/benchmarks/industry-benchmarks.md (PMax conversion thresholds)
      - threshold: monthly_cost_micros_min
        value: 1000000000
        rationale: >
          $1k spend floor — avoids firing on small-spend test PMax
          campaigns where low convs are expected, not pathological.
        source: implementation default
      - threshold: min_campaign_age_days
        value: 21
        rationale: >
          Don't flag PMax campaigns still in their ramp. A campaign visible
          for only days hasn't had time to accumulate 30 conv/month, so
          "insufficient volume to optimize" is not yet a real claim — Google
          guides 6+ weeks before judging PMax. Set to 21 to match the
          disconfirmation harness's T4 ramp threshold so detector and harness
          agree (every signal the harness would kill on age now never fires).
          Validated: this gate removed all 14 false positives (REVISE→MONITOR)
          in the 2026-05-09 snapshot, all of which were 4-20d-old campaigns.
        source: harness T4 (validation/pmax_low_volume.py) + Google PMax ramp guidance
    overrides:
      - when:
          business_type: nonprofit
        skip: true
        confidence: prior
        rationale: |
          Grant accounts typically can't run PMax (policy + structural
          fit). If a grant account somehow has PMax in our data it's a
          configuration anomaly, not a Smart-Bidding-volume problem.
        source: Google Ad Grants policy + research/benchmarks/industry-benchmarks.md
        revisit: never (this should remain a skip)

  pmax_low_conv_volume_change:
    description: >
      Rolling-period delta companion to pmax_low_conv_volume. Compares the
      most recent 14d sum(conversions) for ENABLED PERFORMANCE_MAX campaigns
      against the prior 14d. Fires on ≥25% relative change AND ≥5 absolute
      conversions of movement, in either direction. Independent from
      pmax_low_conv_volume: change fires on movement regardless of absolute
      level; state fires on persistent absolute level regardless of change.
      Improving signals are useful too — they preview that a state-firing
      campaign may exit the firing band on its own as it ramps.
    defaults:
      window_days: 14
      min_pct_delta: 0.25
      min_abs_delta: 5
      min_days_with_data: 7
      min_cost_micros: 500000000  # $500 over the 14-day window
    sources:
      - threshold: window_days
        value: 14
        rationale: >
          Half the parent's 30d window. PMax ramps and Smart-Bidding
          learning phases happen on a multi-week cadence, so 14d-vs-14d
          balances responsiveness against learning-phase noise. Going
          shorter (e.g. 7d) starts catching weekly seasonality as "change."
        source: implementation default (derived from parent pmax_low_conv_volume.window_days)
        confidence: prior
        revisit: >
          If signals lag real PMax volume shifts, try 10d. If they noise
          on learning-phase reshuffling, try 21d.
      - threshold: min_pct_delta
        value: 0.25
        rationale: >
          PMax conversion volume routinely moves ±10-15% on auction and
          inventory variance alone. 25% is the inflection where movement
          stops being normal week-to-week noise. Looser than the 10pp used
          for IS-lost change-detectors because conversion *counts* are
          inherently noisier than rate metrics.
        source: implementation default
        confidence: prior
        revisit: >
          If too noisy, tighten to 0.35. If real shifts are missed (verify
          via spot-check, not gut), loosen to 0.20.
      - threshold: min_abs_delta
        value: 5
        rationale: >
          A 25% relative change on 8 conversions is just 2 conversions —
          well inside Poisson noise. The 5-conv absolute floor ensures the
          movement is large enough to be statistically interpretable.
          Matches the parent's 30-conv "minimum to optimize" / 6 = ~one
          week's worth of meaningful PMax signal.
        source: implementation default
        confidence: prior
        revisit: >
          If a low-volume cohort needs to surface, lower to 3. Below 3 the
          signal becomes Poisson noise.
      - threshold: min_days_with_data
        value: 7
        rationale: >
          7 of 14 days with data in each window. PMax campaigns can have
          zero-impression days legitimately (inventory exhaustion, daypart
          rules), so we don't require full coverage — but we need a
          majority of days for the sum to be a fair comparison.
        source: implementation default
        confidence: prior
        revisit: if change-signals fire on sparse PMax data
      - threshold: min_cost_micros
        value: 500000000
        rationale: >
          $500 floor over 14 days — pro-rated from the parent's $1k/30d.
          Suppresses firing on dead or test campaigns where conversion
          deltas are an artifact of near-zero impressions rather than a
          real volume shift.
        source: implementation default (derived from parent pmax_low_conv_volume.monthly_cost_micros_min)
    overrides:
      - when:
          business_type: nonprofit
        skip: true
        confidence: prior
        rationale: |
          Same reason as parent pmax_low_conv_volume — grant accounts
          can't run PMax under Google Ad Grants policy; any PMax data is
          a config anomaly, not a real volume signal.
        source: Google Ad Grants policy + research/benchmarks/industry-benchmarks.md
        revisit: never (this should remain a skip)

  pmax_conversion_inflation:
    description: >
      Within one account, PMax CVR is ≥3x the Search CVR over 30 days (both
      channels with reliable volume). PMax inherits all primary conversion
      actions by default and can count micro-conversions Search doesn't, so a
      large same-account CVR gap is the observable inflation signature
      (empirically: LOCKLY, 26K PMax vs 290 Search conversions). Harness
      disconfirms when volume is thin, PMax & Search value-per-conversion are
      similar (real conversions of equal worth), or the account has no
      micro-conversion / many-per-click mechanism to drive inflation.
    defaults:
      window_days: 30
      cvr_ratio_min: 3.0
      min_pmax_clicks: 200
      min_search_clicks: 200
      min_pmax_conv: 15
    sources:
      - threshold: cvr_ratio_min
        value: 3.0
        rationale: >
          PMax can legitimately convert above Search (shopping/retargeting
          intent), so ~2x is plausible and not flagged. 3x+ is the inflection
          where the gap usually reflects different conversion-action counting
          rather than traffic quality. On the 2026-05-09 snapshot this fires
          on 3 of 35 dual-channel accounts, incl. one at 73.6% PMax CVR
          (19.7x) — implausible for real purchases.
        source: empirical calibration (2026-05-09 snapshot) + PMax conversion-inheritance behavior
        confidence: prior
        revisit: >
          If it fires on accounts where PMax is genuinely shopping-heavy and
          value-per-conversion matches Search, raise to 4.0. Re-check after
          ingesting per-campaign conversion-action attribution, which would
          let the detector test the mechanism directly instead of by symptom.
      - threshold: min_pmax_clicks
        value: 200
        rationale: >
          Both channels need enough clicks for the CVR ratio to be stable
          rather than small-sample noise.
        source: implementation default
      - threshold: min_search_clicks
        value: 200
        rationale: Same reliability floor for the Search baseline.
        source: implementation default
      - threshold: min_pmax_conv
        value: 15
        rationale: >
          PMax needs a real conversion count for its CVR to be meaningful;
          below 15 the ratio is dominated by a handful of conversions.
        source: implementation default
    overrides:
      - when:
          business_type: nonprofit
        skip: true
        confidence: prior
        rationale: |
          Grant accounts can't run PMax under Google Ad Grants policy.
        source: Google Ad Grants policy
        revisit: never (this should remain a skip)

  search_terms_waste:
    description: >
      A material share of a campaign's spend went to search terms that never
      converted over the window. The #1 audit finding across published
      checklists. DATA DEPENDENCY: the search_terms table (ingest
      --search-terms). SCAFFOLDED 2026-06 — code-complete but UNVALIDATED
      against real search-term data; produces no signals until ingested.
      Harness disconfirms when the "wasted" terms had too few clicks to judge
      (noise) or the waste share is immaterial; the assisted-conversion blind
      spot of last-click data is surfaced as an explicit caveat.
    defaults:
      window_days: 30
      min_term_cost_micros: 50000000      # $50 — a single term must spend this to count
      min_term_impressions: 100           # enough exposure that 0 conv is meaningful
      min_total_waste_micros: 100000000   # $100 — absolute floor on flagged waste
      waste_share_min: 0.15               # >=15% of campaign spend on zero-conv terms
    sources:
      - threshold: min_term_cost_micros
        value: 50000000
        rationale: >
          A term needs ~$50 of spend before "zero conversions" is a confident
          waste signal rather than an unlucky cheap term. Provisional pending
          validation on real search-term data.
        source: implementation default (UNVALIDATED scaffold)
        confidence: prior
        revisit: calibrate against the first ingested search_term_view data
      - threshold: min_term_impressions
        value: 100
        rationale: >
          Separates real non-converting traffic from low-impression noise —
          mirrors the harness's statistical-noise check.
        source: implementation default (UNVALIDATED scaffold)
        confidence: prior
        revisit: calibrate against the first ingested search_term_view data
      - threshold: waste_share_min
        value: 0.15
        rationale: >
          A few stray non-converting terms are normal; >=15% of campaign spend
          on confirmed zero-converters is a systemic leak worth surfacing.
        source: implementation default (UNVALIDATED scaffold)
        confidence: prior
        revisit: calibrate against the first ingested search_term_view data
      - threshold: min_total_waste_micros
        value: 100000000
        rationale: >
          Absolute floor so the percentage gate doesn't fire on tiny campaigns
          where 15% is only a few dollars.
        source: implementation default (UNVALIDATED scaffold)
        confidence: prior
        revisit: calibrate against the first ingested search_term_view data
    overrides: []
