# BrightMatter detector thresholds.
#
# Every threshold MUST cite a research source. If you can't cite it, don't add it.
# Re-run `python -m brightmatter validate <detector>` after any change to confirm
# the thresholds still produce defensible signals.
#
# Schema:
#   detectors.<key>.defaults       — flat dict of threshold values
#   detectors.<key>.sources        — list of {threshold, value, rationale, source}
#                                    (one entry per non-trivial threshold; ground every
#                                    number in research or harness evidence)
#   detectors.<key>.overrides      — list of {when, <overridden values>, rationale, source}
#                                    `when` matches on business_type / spend_tier;
#                                    overridden values replace defaults for matching accounts

version: 1
last_reviewed: 2026-05-10

detectors:

  brand_nonbrand_contamination:
    description: >
      Account-level blended ROAS hides poor non-brand performance. Identifies
      accounts where strong brand-search performance is masking a structurally
      unprofitable non-brand campaign. NOTE: this is a structural decomposition
      of a weighted average, not a causal claim — see research/patterns for
      why the "mask" framing can mislead when brand ROAS is implausibly high.

    defaults:
      window_days: 30
      min_brand_cost_30d: 100
      min_nonbrand_cost_30d: 100
      min_brand_conversions_30d: 10
      min_nonbrand_conversions_30d: 10
      brand_roas_min: 10
      brand_roas_max: 25
      nonbrand_roas_max: 2.0
      blended_roas_min: 5
      brand_token_match_pct_min: 0.30

    sources:
      - threshold: min_brand_cost_30d
        value: 100
        rationale: >
          Minimum spend floor to ensure ROAS arithmetic is meaningful.
          Below $100/30d, single-conversion noise dominates.
        source: implementation default (legacy detector)

      - threshold: min_nonbrand_conversions_30d
        value: 10
        rationale: >
          With fewer than 10 conversions in 30 days, ROAS estimates are
          dominated by statistical noise. Roadway AI / Digital4Startups
          consensus is 30 conversions/month for reliable bid optimization;
          we use 10 as a softer floor below which a "low non-brand ROAS"
          claim is indistinguishable from random variance.
        source: research/benchmarks/industry-benchmarks.md (Smart Bidding Transition Thresholds, Roadway AI 30/month minimum)

      - threshold: brand_roas_max
        value: 25
        rationale: >
          Brand ROAS above 25x in ecommerce is implausible without conversion-value
          inflation (offline imports, LTV blending, double-counting). Vallaeys
          (Tier 1) notes 47% of stuck Smart Bidding campaigns trace to broken
          conversion tracking. Above this ceiling, the brand-vs-nonbrand gap is
          partly an attribution artifact rather than real campaign contamination.
          Confirmed by harness disconfirmation 2026-05-10 (MacKenzie-Childs:
          brand_roas=40.9x, only 21 nonbrand conversions, claim was unsafe).
        source: research/experts/tier1-expert-frameworks.md (Vallaeys conversion-tracking incidence); harness audit 2026-05-10

      - threshold: nonbrand_roas_max
        value: 2.0
        rationale: >
          Non-brand ROAS below 2x is the "underperformance" half of the
          contamination claim. Lolk and Geddes both treat 2x as the rough
          break-even line for non-brand search after factoring margin and CAC.
        source: research/experts/tier1-expert-frameworks.md (Lolk profitability framework, Geddes structural rules)

      - threshold: blended_roas_min
        value: 5
        rationale: >
          Blended ROAS above 5x while non-brand sits below 2x is the
          definitional "masking" condition. Aaron Levy's diminishing-returns
          framework explicitly calls out blended ROAS as the metric most
          likely to hide marginal-spend losses.
        source: research/benchmarks/industry-benchmarks.md (Aaron Levy diminishing-returns framework)

      - threshold: brand_token_match_pct_min
        value: 0.30
        rationale: >
          Campaign-name heuristics (LIKE '%brand%') misfire on competitor-defense
          campaigns and brand-misspelling campaigns. If a campaign labeled "brand"
          has fewer than 30% of its keywords containing actual brand tokens, the
          label is unreliable and the contamination claim cannot be made.
          Geddes ranks match-type/naming contamination as the #1 structural flaw.
        source: research/experts/tier1-expert-frameworks.md (Geddes naming/match-type contamination, Lolk SQR primacy)

    overrides:
      - when:
          business_type: local
        nonbrand_roas_max: 0.5
        rationale: >
          Local services (plumbing, dental, HVAC) draw 75-85% of paid revenue
          from brand search. Non-brand campaigns in this vertical are
          discovery/awareness, not the profit center. A 1.5x non-brand ROAS
          here is normal, not pathological — only fire when non-brand is
          genuinely below break-even (<0.5x).
        source: research/experts/tier2-expert-insights.md (Lolk local-services brand dominance)

      - when:
          business_type: lead_gen
        skip: true
        rationale: >
          Lead-gen accounts often track form fills without conversion_value.
          ROAS-based contamination detection is meaningless without revenue
          attribution. Skip until a CPA-based variant is implemented.
        source: research/benchmarks/industry-benchmarks.md (CVR/CPL framework; lead gen lacks revenue)


  # ───────────────────────────────────────────────────────────────────────
  # Detectors below are wired to read from YAML defaults only (Phase 1A).
  # Vertical/tier overrides come in Phase 1B once benchmark data is embedded.
  # ───────────────────────────────────────────────────────────────────────

  budget_limited_is:
    description: >
      Search campaign losing >35% impression share to budget over the last 7
      days with meaningful spend. Implicit claim: more budget would mean
      more conversions. Harness disconfirms when rank-loss dominates,
      conversion volume is too low, or budget is intentionally throttled.
    defaults:
      window_days: 7
      avg_budget_lost_is_min: 0.35
      total_cost_micros_min: 500000000  # $500 over the 7-day window
    sources:
      - threshold: avg_budget_lost_is_min
        value: 0.35
        rationale: >
          Industry consensus: budget-lost-IS > 20% means the campaign is
          throttling itself. We use 0.35 as a stricter "definitely material"
          line consistent with pattern-detection-logic.md domain 3.
        source: research/patterns/pattern-detection-logic.md (Impression Share / Budget Pressure)
      - threshold: total_cost_micros_min
        value: 500000000
        rationale: >
          $500 floor over 7 days ensures the IS metric is computed on
          enough impressions to be reliable.
        source: implementation default (legacy detector)
    overrides:
      - when:
          business_type: nonprofit
        skip: true
        confidence: prior
        rationale: |
          Google Ad Grants operate under a $10K/month cap, $2.00 max CPC,
          and a 5% minimum CTR — all REGULATORY constraints. A grant
          account losing IS to budget is hitting Google's cap, not its
          own. The "more budget would mean more conversions" claim is
          meaningless when budget is externally fixed.
        source: research/benchmarks/industry-benchmarks.md (Google Ad Grants constraints)
        revisit: |
          When we add a `grant_budget_capped_at_ceiling` signal type that
          fires only when the grant's $10K cap is the active constraint,
          remove this skip and route grant accounts through the new
          detector instead.

  cvr_drop:
    description: >
      Campaign CVR dropped >30% week-over-week with sufficient volume both
      weeks. Harness disconfirms when tracking changed, campaign config
      shifted mid-period, or prior week was an outlier (regression to mean).
    defaults:
      current_window_days: 7
      prior_window_days: 7
      cvr_drop_ratio: 0.7        # current < prior * 0.7  (a 30% drop)
      prior_clicks_min: 100
      current_clicks_min: 100
      prior_conv_min: 10
      prior_cvr_min: 0.01        # prior CVR > 1% to suppress noise
    sources:
      - threshold: cvr_drop_ratio
        value: 0.7
        rationale: >
          A 30% week-over-week CVR drop is the threshold expert audits use
          to flag "investigate" (landing page, tracking, or competitive
          changes). Geddes/Vallaeys both reference this cadence.
        source: research/patterns/pattern-detection-logic.md (CVR Anomalies)
      - threshold: prior_conv_min
        value: 10
        rationale: >
          Below 10 conversions in a week, the CVR delta is dominated by
          noise. Roadway AI uses ≥30/month for reliable bid optimization;
          10/week is a softer floor for anomaly detection.
        source: research/benchmarks/industry-benchmarks.md (Roadway AI thresholds)
    overrides: []

  cpa_spike:
    description: >
      Recent (7-day) CPA exceeds 3x the 30-day baseline with sufficient
      conversions AND multi-day activity to back the claim. The recent
      window must have ≥5 conversions, activity on ≥3 distinct days, and
      no single day accounting for >50% of weekly spend — otherwise the
      "spike" is a sampling artifact, not a real degradation. Harness
      additionally disconfirms when bidding strategy was changed mid-period
      or AOV rose proportionally (higher CPA buys higher-value conversions).
    defaults:
      recent_window_days: 7
      baseline_window_days: 30   # 8-30 days back from today
      recent_cpa_multiplier: 3.0
      recent_conv_min: 5
      baseline_conv_min: 3
      recent_active_days_min: 3
      max_single_day_share_max: 0.50
    sources:
      - threshold: recent_cpa_multiplier
        value: 3.0
        rationale: >
          A 3x spike is the standard "this is real, not noise" line in
          most audit frameworks. Smaller multiples generate too much false
          signal in low-volume campaigns.
        source: research/patterns/pattern-detection-logic.md (CPA Spikes)
      - threshold: recent_conv_min
        value: 5
        rationale: >
          Raised from 1 → 5 on 2026-05-16 after harness disconfirmation
          (0/6 on T1 Recent-week volume reliability). The harness's T1
          fires "noise-dominated" below 5 conversions; the detector must
          enforce the same floor before firing. With <5 recent conversions
          a "CPA spike" is statistically indistinguishable from sampling
          noise around the baseline.
        source: harness audit 2026-05-16 (cpa_spike T1 disconfirmation rate)
        confidence: prior
        revisit: >
          If a 30-day run produces 0 cpa_spike signals across the active
          cohort, consider lowering to 3 — but only after first relaxing
          recent_active_days_min, since multi-day activity is a stronger
          guarantee of reliability than raw conversion count.
      - threshold: recent_active_days_min
        value: 3
        rationale: >
          Added 2026-05-16 in response to harness audit — all 6 signals
          in the prior run had spend on only one day of the 7-day window.
          A "CPA spike" computed against one day of activity isn't a trend,
          it's a single observation. Requiring 3 of 7 days with spend
          ensures the recent-window CPA averages over at least three
          observations.
        source: harness audit 2026-05-16 (cpa_spike T2 disconfirmation rate)
        confidence: prior
        revisit: >
          If the detector under-fires, try 2 before lowering further.
          Lowering below 2 effectively reverts to the pre-fix behavior.
      - threshold: max_single_day_share_max
        value: 0.50
        rationale: >
          Added 2026-05-16. Mirrors the harness's T2 single-day-outlier
          test promoted from disconfirmation to pre-filter. Any recent
          window where one day accounts for >50% of spend has too much
          single-day leverage on the CPA average to call the change a
          trend. T2 used the same 0.50 cutoff and disconfirmed 6/6 prior
          signals — by gating at the detector, we never produce signals
          that T2 would immediately disconfirm.
        source: harness audit 2026-05-16 (cpa_spike T2 disconfirmation rate)
        confidence: prior
        revisit: >
          If the detector under-fires, try 0.60 before relaxing further.
          0.50 corresponds to "one day is the median of the rest combined."
    overrides: []

  budget_capped:
    description: >
      Campaign averaged >30% IS lost to budget across 7+ days of the last
      14. Weaker than budget_limited_is — it's an observation, not a
      recommendation. Harness disconfirms when actual budget utilization
      is low (cap is nominal, not binding) or rank-loss dominates.
    defaults:
      window_days: 14
      avg_budget_lost_is_min: 0.30
      min_days_capped: 7
    sources:
      - threshold: avg_budget_lost_is_min
        value: 0.30
        rationale: >
          Slightly softer than budget_limited_is (0.35) because this signal
          fires when a campaign is consistently *capped*, not necessarily
          starved. 30% is the inflection per pattern-detection-logic.md.
        source: research/patterns/pattern-detection-logic.md (Budget Constraints)
      - threshold: min_days_capped
        value: 7
        rationale: >
          Half the 14-day window. Below this, the "consistently" framing
          isn't earned.
        source: implementation default
    overrides:
      - when:
          business_type: nonprofit
        skip: true
        confidence: prior
        rationale: |
          Same reason as budget_limited_is: grant accounts are capped by
          policy, not by the advertiser's budget choices.
        source: research/benchmarks/industry-benchmarks.md (Google Ad Grants)
        revisit: when grant-specific detector exists

  auto_applied_changes:
    description: >
      Account has auto-applied changes from Google's recommendation system
      in the last 30 days. Risk signal — Google's auto-applied changes can
      silently degrade performance. Harness disconfirms when outcomes
      didn't actually move or the changes are too recent to measure.
    defaults:
      window_days: 30
      critical_count: 5     # ≥5 changes = critical, else warning
    sources:
      - threshold: critical_count
        value: 5
        rationale: >
          One or two auto-changes are normal; 5+ in a month indicates
          Google is making sustained structural modifications worth a
          human review (Vallaeys' "Google's defaults quietly drain budget"
          observation).
        source: research/experts/tier1-expert-frameworks.md (Vallaeys)
    overrides: []

  duplicate_primary_conversions:
    description: >
      Account has 3+ ENABLED primary conversion actions, which inflates
      reported conversions. Harness disconfirms when the multiple actions
      are in distinct categories (LEAD + PURCHASE + APPOINTMENT) — legit
      multi-goal tracking rather than duplication.
    defaults:
      primary_count_min: 3
    sources:
      - threshold: primary_count_min
        value: 3
        rationale: >
          One primary is ideal; two is acceptable for a hybrid model
          (ecommerce + lead). Three or more strongly suggests duplication
          or misconfiguration per Rhodes/Vallaeys conversion-audit guidance.
        source: research/experts/tier1-expert-frameworks.md (Rhodes; Vallaeys)
    overrides: []

  over_segmentation:
    description: >
      Account has many small campaigns starving for conversion data —
      ≥50% of enabled campaigns get fewer than 30 conv/month despite the
      account having ≥100 total conversions. Harness disconfirms when the
      "starving" campaigns are intentional splits (geo, brand vs non-brand,
      campaign-type).
    defaults:
      window_days: 30
      per_campaign_conv_min: 30
      account_total_conv_min: 100
      account_campaigns_min: 5
      starving_share_min: 0.5
    sources:
      - threshold: per_campaign_conv_min
        value: 30
        rationale: >
          The cross-industry Smart-Bidding minimum: Google + Roadway AI
          + Digital4Startups all converge on 30 conversions/month per
          campaign for reliable optimization.
        source: research/benchmarks/industry-benchmarks.md (Smart Bidding thresholds)
      - threshold: starving_share_min
        value: 0.5
        rationale: >
          A few small campaigns is normal (tests, geo splits). When more
          than half the campaigns starve, consolidation is the structural
          fix per smec/Lolk.
        source: research/experts/tier1-expert-frameworks.md (Lolk consolidation)
    overrides: []

  insufficient_conversions_for_strategy:
    description: >
      Campaign uses TARGET_CPA or TARGET_ROAS bidding with < 15 conv/month.
      Smart Bidding can't optimize without enough conversion data. Harness
      disconfirms when campaign is paused, the strategy was just changed
      (still ramping), or value/AOV is high enough for tROAS to optimize
      on revenue despite low count.
    defaults:
      window_days: 30
      monthly_conv_min: 15
      strategies:
        - TARGET_CPA
        - TARGET_ROAS
    sources:
      - threshold: monthly_conv_min
        value: 15
        rationale: >
          Jyll's transition threshold: <15 conv/month = Maximize
          Conversions (no target); 15-30 = begin tCPA testing; 30+ =
          tCPA reliable. Below 15 the target strategy thrashes.
        source: research/benchmarks/industry-benchmarks.md (Jyll Saskin Gales)
    overrides:
      - when:
          business_type: nonprofit
        skip: true
        confidence: prior
        rationale: |
          Grant accounts have different optimization rules and conversion
          volume expectations than commercial advertisers. The Jyll
          threshold doesn't apply.
        source: research/benchmarks/industry-benchmarks.md (Google Ad Grants)
        revisit: when we add grant-specific bidding pattern detection
      - when:
          business_type: app
        skip: true
        confidence: prior
        rationale: |
          APP campaigns use App-specific bidding strategies (TARGET_CPI,
          TARGET_RETURN_ON_AD_SPEND_APP) — not TARGET_CPA/TARGET_ROAS.
          The detector's SQL filter already excludes them via the
          strategies list, but this override is defense-in-depth.
        source: Google Ads bidding-strategy taxonomy
        revisit: when we add an app-specific volume detector

  pmax_low_conv_volume:
    description: >
      PMax campaign has < 30 conv/month with > $1k spend. PMax Smart
      Bidding needs 30+ conversions to optimize meaningfully. Harness
      disconfirms when the campaign is too new (still ramping), spend
      share is tiny (a test, not the structure), or high AOV makes value
      a usable signal.
    defaults:
      window_days: 30
      monthly_conv_min: 30
      monthly_cost_micros_min: 1000000000  # $1000
    sources:
      - threshold: monthly_conv_min
        value: 30
        rationale: >
          Digital4Startups + Google PMax guidance: 50-100/month ideal,
          30 minimum. Below this PMax's signal-to-noise is too low.
        source: research/benchmarks/industry-benchmarks.md (PMax conversion thresholds)
      - threshold: monthly_cost_micros_min
        value: 1000000000
        rationale: >
          $1k spend floor — avoids firing on small-spend test PMax
          campaigns where low convs are expected, not pathological.
        source: implementation default
    overrides:
      - when:
          business_type: nonprofit
        skip: true
        confidence: prior
        rationale: |
          Grant accounts typically can't run PMax (policy + structural
          fit). If a grant account somehow has PMax in our data it's a
          configuration anomaly, not a Smart-Bidding-volume problem.
        source: Google Ad Grants policy + research/benchmarks/industry-benchmarks.md
        revisit: never (this should remain a skip)
