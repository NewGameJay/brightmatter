# External seasonal baselines (Phase 2.6) — monthly CPA index by vertical.
# 1.0 = the vertical's annual-average CPA. >1 = CPA typically ELEVATED that month
# (post-holiday softness, low-intent traffic); <1 = typically efficient (BFCM/
# holiday volume drives CPA down). Source: Triple Whale / WordStream monthly
# seasonality patterns. A proxy until BrightMatter has 12+ months of its own
# data to build internal per-vertical/per-tier curves.

# Used to ask "is this CPA normal for this vertical at this time of year?" before
# flagging it — so a normal Q1 ecommerce dip isn't mistaken for a problem.

default:   # gentle seasonality — applies to verticals without a specific curve
  jan: 1.12
  feb: 1.08
  mar: 1.04
  apr: 1.00
  may: 0.98
  jun: 0.96
  jul: 0.95
  aug: 0.96
  sep: 0.99
  oct: 1.02
  nov: 0.93
  dec: 0.90

