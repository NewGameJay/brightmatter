<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrightMatter — Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --surface: #12151c;
  --surface-2: #181c26;
  --border: rgba(255,255,255,.06);
  --border-active: rgba(255,255,255,.12);
  --text: #d4d0e0;
  --text-secondary: #8a86a0;
  --dim: #55516a;
  --accent: #7B68EE;
  --cyan: #34d399;
  --coral: #f06868;
  --gold: #f0b060;
  --purple: #a78bfa;
  --teal: #2dd4bf;
  --orange: #fb923c;
  --blue: #60a5fa;
  --row-hover: rgba(123,104,238,.04);
  --flash: rgba(52,211,153,.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overflow:hidden; }
::selection { background:var(--accent); color:#fff; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(123,104,238,.18); border-radius:3px; }

.header {
  position:fixed; top:0; left:0; right:0; z-index:20; height:48px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; background:rgba(10,12,16,.95);
  border-bottom:1px solid var(--border); backdrop-filter:blur(16px);
}
.logo { display:flex; align-items:center; gap:10px; }
.logo-dot { width:7px; height:7px; border-radius:50%; background:var(--cyan); box-shadow:0 0 8px var(--cyan); animation:pulse 2.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.85)} }
.logo-name { font-weight:700; font-size:13px; letter-spacing:2px; color:#fff; }
.logo-tag { font-size:9px; color:var(--cyan); font-family:'JetBrains Mono',monospace; font-weight:500; letter-spacing:1px; border:1px solid rgba(52,211,153,.25); padding:1px 6px; border-radius:3px; }

.stats-bar { display:flex; gap:28px; }
.stat { text-align:center; }
.stat-val { font-weight:700; font-size:18px; font-family:'JetBrains Mono',monospace; transition:color .3s,text-shadow .3s; }
.stat-val.flash { text-shadow:0 0 12px currentColor; }
.stat-label { font-size:8px; color:var(--dim); letter-spacing:1.5px; text-transform:uppercase; margin-top:1px; }

.meta-right { display:flex; align-items:center; gap:16px; }
.refresh-badge { font-size:8px; color:var(--dim); font-family:'JetBrains Mono',monospace; text-align:right; line-height:1.6; }
.refresh-badge .live { color:var(--cyan); font-weight:600; }

.grid {
  display:grid; position:fixed; top:48px; left:0; right:0; bottom:0;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:1px; background:var(--border);
}
.panel {
  background:var(--surface); display:flex; flex-direction:column; overflow:hidden;
  min-height:0;
}
.panel-header {
  padding:10px 14px 8px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.panel-title {
  font-size:10px; font-weight:600; letter-spacing:1.8px; text-transform:uppercase; color:var(--text-secondary);
  display:flex; align-items:center; gap:6px;
}
.panel-title .dot { width:5px; height:5px; border-radius:50%; }
.panel-count { font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--dim); }
.panel-filters {
  display:flex; gap:4px; padding:6px 14px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.filter-btn {
  font-size:9px; font-family:'JetBrains Mono',monospace; padding:2px 8px; border-radius:3px;
  background:transparent; border:1px solid var(--border); color:var(--dim); cursor:pointer;
  transition:all .15s;
}
.filter-btn:hover { border-color:var(--border-active); color:var(--text-secondary); }
.filter-btn.active { background:rgba(123,104,238,.12); border-color:var(--accent); color:var(--accent); }
.panel-scroll { flex:1; overflow-y:auto; min-height:0; }

/* Table rows */
.row {
  display:flex; align-items:flex-start; padding:7px 14px; border-bottom:1px solid rgba(255,255,255,.02);
  transition:background .12s; font-size:12px; gap:10px; min-height:36px;
}
.row:hover { background:var(--row-hover); }
.row.flash-row { animation:flashIn .6s ease-out; }
@keyframes flashIn { 0%{background:var(--flash)} 100%{background:transparent} }

.row-time {
  width:56px; flex-shrink:0; font-size:9px; color:var(--dim);
  font-family:'JetBrains Mono',monospace; padding-top:2px; line-height:1.4;
}
.row-icon { width:18px; flex-shrink:0; font-size:12px; text-align:center; padding-top:1px; }
.row-body { flex:1; min-width:0; }
.row-text { font-size:11.5px; line-height:1.45; color:var(--text); word-break:break-word; }
.row-detail { font-size:9px; color:var(--dim); font-family:'JetBrains Mono',monospace; margin-top:2px; }
.row-badge {
  flex-shrink:0; font-size:9px; font-family:'JetBrains Mono',monospace;
  padding:1px 6px; border-radius:3px; font-weight:500;
}
.badge-purple { background:rgba(167,139,250,.12); color:var(--purple); }
.badge-cyan { background:rgba(52,211,153,.12); color:var(--cyan); }
.badge-gold { background:rgba(240,176,96,.12); color:var(--gold); }
.badge-coral { background:rgba(240,104,104,.12); color:var(--coral); }
.badge-teal { background:rgba(45,212,191,.12); color:var(--teal); }
.badge-orange { background:rgba(251,146,60,.12); color:var(--orange); }
.badge-blue { background:rgba(96,165,250,.12); color:var(--blue); }

/* Pattern confidence bar */
.conf-bar { display:flex; align-items:center; gap:6px; }
.conf-track { width:48px; height:4px; background:rgba(255,255,255,.04); border-radius:2px; overflow:hidden; flex-shrink:0; }
.conf-fill { height:100%; border-radius:2px; transition:width .6s ease; }
.conf-val { font-size:10px; font-family:'JetBrains Mono',monospace; width:32px; }

/* Watermark status */
.stream-status { display:flex; align-items:center; gap:6px; padding:10px 14px; border-bottom:1px solid rgba(255,255,255,.03); }
.stream-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.stream-dot.active { background:var(--cyan); box-shadow:0 0 6px var(--cyan); }
.stream-dot.stale { background:var(--gold); }
.stream-dot.dead { background:var(--coral); }
.stream-info { flex:1; }
.stream-name { font-size:11px; font-weight:600; color:var(--text); }
.stream-ts { font-size:9px; color:var(--dim); font-family:'JetBrains Mono',monospace; margin-top:1px; }

/* Empty state */
.empty-state { padding:24px 14px; text-align:center; color:var(--dim); font-size:11px; }

/* Loading */
#loading {
  position:fixed; inset:0; z-index:50; background:var(--bg);
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px;
  transition:opacity .4s;
}
#loading.done { opacity:0; pointer-events:none; }
.spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--cyan); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* Responsive: stack on small screens */
@media(max-width:1100px) { .grid { grid-template-columns:1fr 1fr; grid-template-rows:auto; } }
@media(max-width:700px) { .grid { grid-template-columns:1fr; } .stats-bar { gap:14px; } .stat-val { font-size:14px; } }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div style="font-size:10px;color:var(--dim);letter-spacing:2px;font-family:'JetBrains Mono',monospace">CONNECTING TO SUPABASE</div></div>

<div class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-name">BRIGHTMATTER</span>
    <span class="logo-tag">LIVE</span>
  </div>
  <div class="stats-bar" id="stats-bar"></div>
  <div class="meta-right">
    <div class="refresh-badge">
      <span class="live">&#9679; STREAMING</span> &mdash; 10s refresh<br>
      <span id="last-update"></span>
    </div>
  </div>
</div>

<div class="grid">
  <!-- Panel 1: Activity Feed -->
  <div class="panel" id="panel-feed">
    <div class="panel-header">
      <div class="panel-title"><div class="dot" style="background:var(--cyan)"></div>Activity Feed</div>
      <div class="panel-count" id="feed-count"></div>
    </div>
    <div class="panel-filters" id="feed-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="episode">Episodes</button>
      <button class="filter-btn" data-filter="pattern">Patterns</button>
      <button class="filter-btn" data-filter="event">Events</button>
      <button class="filter-btn" data-filter="signal">Signals</button>
    </div>
    <div class="panel-scroll" id="feed-scroll"></div>
  </div>

  <!-- Panel 2: Patterns -->
  <div class="panel" id="panel-patterns">
    <div class="panel-header">
      <div class="panel-title"><div class="dot" style="background:var(--gold)"></div>Semantic Patterns</div>
      <div class="panel-count" id="pattern-count"></div>
    </div>
    <div class="panel-filters" id="pattern-filters">
      <button class="filter-btn active" data-sort="confidence">By Confidence</button>
      <button class="filter-btn" data-sort="evidence">By Evidence</button>
      <button class="filter-btn" data-sort="recent">Recent</button>
    </div>
    <div class="panel-scroll" id="pattern-scroll"></div>
  </div>

  <!-- Panel 3: Episodes -->
  <div class="panel" id="panel-episodes">
    <div class="panel-header">
      <div class="panel-title"><div class="dot" style="background:var(--purple)"></div>Recent Episodes</div>
      <div class="panel-count" id="episode-count"></div>
    </div>
    <div class="panel-filters" id="episode-filters">
      <button class="filter-btn active" data-domain="all">All</button>
      <button class="filter-btn" data-domain="campaign">Campaign</button>
      <button class="filter-btn" data-domain="revenue">Revenue</button>
      <button class="filter-btn" data-domain="health">Health</button>
      <button class="filter-btn" data-domain="content">Content</button>
    </div>
    <div class="panel-scroll" id="episode-scroll"></div>
  </div>

  <!-- Panel 4: Skill Distribution -->
  <div class="panel" id="panel-skills">
    <div class="panel-header">
      <div class="panel-title"><div class="dot" style="background:var(--accent)"></div>Skills &amp; Domains</div>
      <div class="panel-count" id="skill-count"></div>
    </div>
    <div class="panel-scroll" id="skill-scroll"></div>
  </div>

  <!-- Panel 5: Data Streams -->
  <div class="panel" id="panel-streams">
    <div class="panel-header">
      <div class="panel-title"><div class="dot" style="background:var(--teal)"></div>Data Streams</div>
      <div class="panel-count" id="stream-count"></div>
    </div>
    <div class="panel-scroll" id="stream-scroll"></div>
  </div>

  <!-- Panel 6: Guidance Cache -->
  <div class="panel" id="panel-guidance">
    <div class="panel-header">
      <div class="panel-title"><div class="dot" style="background:var(--blue)"></div>Guidance Cache</div>
      <div class="panel-count" id="guidance-count"></div>
    </div>
    <div class="panel-scroll" id="guidance-scroll"></div>
  </div>
</div>

<script>
const API = window.location.origin;
const ICONS = {
  bolt:'\u26A1', brain:'\uD83E\uDDE0', sparkle:'\u2728', signal:'\uD83D\uDCE1',
  sync:'\uD83D\uDD04', robot:'\uD83E\uDD16', compass:'\uD83E\uDDED',
  mic:'\uD83C\uDF99\uFE0F', link:'\uD83D\uDD17'
};
const EST = {timeZone:'America/New_York',hour:'2-digit',minute:'2-digit',hour12:true};
const EST_FULL = {timeZone:'America/New_York',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true,month:'short',day:'numeric'};

function toTime(iso) { return iso ? new Date(iso).toLocaleTimeString('en-US',EST) : ''; }
function toFull(iso) { return iso ? new Date(iso).toLocaleString('en-US',EST_FULL) : ''; }
function ago(iso) {
  if(!iso)return '';
  const s=(Date.now()-new Date(iso).getTime())/1000;
  if(s<60)return 'now';if(s<3600)return Math.floor(s/60)+'m';
  if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';
}
function confColor(c) { return c>.8?'var(--cyan)':c>.6?'var(--gold)':'var(--coral)'; }

// ── State ──
let feedFilter = 'all';
let patternSort = 'confidence';
let episodeDomain = 'all';
let prevFeedIds = new Set();
let prevPatternIds = new Set();

// ── Filter wiring ──
document.getElementById('feed-filters').addEventListener('click', e => {
  if(!e.target.classList.contains('filter-btn'))return;
  document.querySelectorAll('#feed-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  feedFilter = e.target.dataset.filter;
  renderFeedPanel(lastFeed);
});
document.getElementById('pattern-filters').addEventListener('click', e => {
  if(!e.target.classList.contains('filter-btn'))return;
  document.querySelectorAll('#pattern-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  patternSort = e.target.dataset.sort;
  renderPatterns(lastData);
});
document.getElementById('episode-filters').addEventListener('click', e => {
  if(!e.target.classList.contains('filter-btn'))return;
  document.querySelectorAll('#episode-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  episodeDomain = e.target.dataset.domain;
  renderEpisodes(lastData);
});

// ── Stats ──
function renderStats(d) {
  const items = [
    {v:d.episodes.length, l:'Episodes', c:'var(--purple)'},
    {v:d.patterns.length, l:'Patterns', c:'var(--gold)'},
    {v:Object.keys(d.skill_dist).length, l:'Skills', c:'var(--cyan)'},
    {v:(d.avg_confidence*100).toFixed(0)+'%', l:'Confidence', c:'var(--coral)'},
    {v:d.signal_count, l:'Signals', c:'var(--teal)'},
    {v:d.event_count, l:'Events', c:'var(--blue)'}
  ];
  const el = document.getElementById('stats-bar');
  if(!el.children.length) {
    items.forEach(s => {
      const x=document.createElement('div'); x.className='stat';
      x.innerHTML=`<div class="stat-val" style="color:${s.c}" data-stat="${s.l}">${s.v}</div><div class="stat-label">${s.l}</div>`;
      el.appendChild(x);
    });
  } else {
    items.forEach(s => {
      const v=el.querySelector(`[data-stat="${s.l}"]`);
      if(v&&v.textContent!==String(s.v)){v.textContent=s.v;v.classList.add('flash');setTimeout(()=>v.classList.remove('flash'),700);}
    });
  }
}

// ── Feed Panel ──
let lastFeed = [];
function renderFeedPanel(feed) {
  lastFeed = feed;
  const filtered = feedFilter==='all' ? feed : feed.filter(f=>f.type===feedFilter);
  document.getElementById('feed-count').textContent = filtered.length + ' items';
  const el = document.getElementById('feed-scroll');
  const newIds = new Set(filtered.map(f=>f.ts+f.text));
  let html = '';
  filtered.forEach(f => {
    const isNew = !prevFeedIds.has(f.ts+f.text);
    html += `<div class="row${isNew?' flash-row':''}">
      <div class="row-time">${toTime(f.ts)}<br>${ago(f.ts)}</div>
      <div class="row-icon" style="color:var(--${f.color||'dim'})">${ICONS[f.icon]||'\u25CF'}</div>
      <div class="row-body">
        <div class="row-text">${f.text}</div>
        ${f.detail?`<div class="row-detail">${f.detail}</div>`:''}
      </div>
      <div class="row-badge badge-${f.color||'purple'}">${f.type}</div>
    </div>`;
  });
  el.innerHTML = html || '<div class="empty-state">No activity yet</div>';
  prevFeedIds = newIds;
}

// ── Patterns Panel ──
let lastData = null;
function renderPatterns(d) {
  if(!d)return;
  let patterns = [...d.patterns];
  if(patternSort==='confidence') patterns.sort((a,b)=>(b.confidence||0)-(a.confidence||0));
  else if(patternSort==='evidence') patterns.sort((a,b)=>(b.evidence_count||0)-(a.evidence_count||0));
  else patterns.sort((a,b)=>new Date(b.updated_at||0)-new Date(a.updated_at||0));

  document.getElementById('pattern-count').textContent = patterns.length + ' patterns';
  const el = document.getElementById('pattern-scroll');
  const newIds = new Set(patterns.map(p=>p.pattern_id));
  let html = '';
  patterns.forEach(p => {
    const c = p.confidence||0;
    const ev = p.evidence_count||0;
    const isNew = !prevPatternIds.has(p.pattern_id);
    const wins = p.successes||0, losses = p.failures||0;
    const wr = (wins+losses)>0 ? ((wins/(wins+losses))*100).toFixed(0)+'%' : '—';
    html += `<div class="row${isNew?' flash-row':''}">
      <div class="row-body">
        <div class="row-text" style="font-weight:500">${p.skill_name||'unknown'}</div>
        <div class="row-detail">${p.domain||'generic'} · ${ev} evidence · ${wins}W/${losses}L (${wr})</div>
      </div>
      <div class="conf-bar">
        <div class="conf-track"><div class="conf-fill" style="width:${(c*100).toFixed(0)}%;background:${confColor(c)}"></div></div>
        <div class="conf-val" style="color:${confColor(c)}">${(c*100).toFixed(0)}%</div>
      </div>
    </div>`;
  });
  el.innerHTML = html || '<div class="empty-state">No patterns formed yet</div>';
  prevPatternIds = newIds;
}

// ── Episodes Panel ──
function renderEpisodes(d) {
  if(!d)return;
  let episodes = [...d.episodes];
  if(episodeDomain!=='all') episodes = episodes.filter(e=>(e.domain||'generic')===episodeDomain);

  document.getElementById('episode-count').textContent = episodes.length + ' episodes';
  const el = document.getElementById('episode-scroll');
  let html = '';
  episodes.slice(0,80).forEach(ep => {
    const skill = ep.skill_name||'unknown';
    const domain = ep.domain||'generic';
    const pe = ep.prediction_error||0;
    const w = (ep.weight||0).toFixed(2);
    const domColor = {campaign:'coral',revenue:'cyan',content:'gold',health:'teal',generic:'purple'}[domain]||'purple';
    html += `<div class="row">
      <div class="row-time">${toTime(ep.created_at)}<br>${ago(ep.created_at)}</div>
      <div class="row-body">
        <div class="row-text">${skill}</div>
        <div class="row-detail">weight ${w} · error ${(pe*100).toFixed(1)}%</div>
      </div>
      <div class="row-badge badge-${domColor}">${domain}</div>
    </div>`;
  });
  el.innerHTML = html || '<div class="empty-state">No episodes yet</div>';
}

// ── Skills Panel ──
function renderSkills(d) {
  if(!d)return;
  const skills = Object.entries(d.skill_dist).sort((a,b)=>b[1]-a[1]);
  const domains = Object.entries(d.domain_dist).sort((a,b)=>b[1]-a[1]);
  const mx = skills.length ? skills[0][1] : 1;

  document.getElementById('skill-count').textContent = skills.length + ' skills';
  const el = document.getElementById('skill-scroll');

  let html = '<div style="padding:10px 14px 6px"><div style="font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:8px">Domains</div>';
  const domColors = {campaign:'var(--coral)',revenue:'var(--cyan)',content:'var(--gold)',health:'var(--teal)',generic:'var(--purple)'};
  domains.forEach(([dom,n]) => {
    html += `<div style="display:flex;align-items:center;gap:8px;padding:3px 0">
      <div style="width:7px;height:7px;border-radius:50%;background:${domColors[dom]||'var(--dim)'}"></div>
      <div style="flex:1;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary)">${dom}</div>
      <div style="font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;color:${domColors[dom]||'var(--dim)'}">${n}</div>
    </div>`;
  });

  html += '</div><div style="padding:10px 14px 6px"><div style="font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:8px">Episodes by Skill</div>';
  skills.forEach(([s,n]) => {
    const pct = (n/mx*100).toFixed(0);
    html += `<div style="display:flex;align-items:center;gap:6px;padding:3px 0">
      <div style="width:110px;font-size:10px;color:var(--text-secondary);font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${s}">${s}</div>
      <div style="flex:1;height:4px;background:rgba(255,255,255,.03);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:var(--accent);border-radius:2px;transition:width .6s"></div>
      </div>
      <div style="width:28px;text-align:right;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--dim)">${n}</div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

// ── Streams Panel ──
function renderStreams(d) {
  if(!d)return;
  const wm = d.watermarks || [];
  document.getElementById('stream-count').textContent = wm.length + ' sources';
  const el = document.getElementById('stream-scroll');
  let html = '';
  wm.forEach(w => {
    const ts = w.last_processed_at;
    const secAgo = ts ? (Date.now()-new Date(ts).getTime())/1000 : Infinity;
    const status = secAgo<3600?'active':secAgo<86400?'stale':'dead';
    const statusLabel = status==='active'?'Synced':status==='stale'?'Stale':'Inactive';
    html += `<div class="stream-status">
      <div class="stream-dot ${status}"></div>
      <div class="stream-info">
        <div class="stream-name">${(w.source||'').toUpperCase()}</div>
        <div class="stream-ts">${ts?toFull(ts)+' ET':'Never synced'} · ${statusLabel}</div>
      </div>
      <div class="row-badge badge-${status==='active'?'cyan':status==='stale'?'gold':'coral'}">${ago(ts)||'—'}</div>
    </div>`;
  });
  el.innerHTML = html || '<div class="empty-state">No data streams configured</div>';
}

// ── Guidance Panel ──
function renderGuidance(d) {
  if(!d)return;
  const guidance = d.guidance || [];
  document.getElementById('guidance-count').textContent = guidance.length + ' cached';
  const el = document.getElementById('guidance-scroll');
  let html = '';
  guidance.forEach(g => {
    const c = g.confidence||0;
    html += `<div class="row">
      <div class="row-body">
        <div class="row-text">${g.skill_name||'unknown'}</div>
        <div class="row-detail">${g.client_id||'all clients'} · ${g.domain||'generic'}</div>
      </div>
      <div class="conf-bar">
        <div class="conf-track"><div class="conf-fill" style="width:${(c*100).toFixed(0)}%;background:${confColor(c)}"></div></div>
        <div class="conf-val" style="color:${confColor(c)}">${(c*100).toFixed(0)}%</div>
      </div>
    </div>`;
  });
  el.innerHTML = html || '<div class="empty-state">No guidance cached</div>';
}

// ── Main loop ──
let firstLoad = true;

async function refresh() {
  try {
    const [dataRes, feedRes] = await Promise.all([
      fetch(API+'/api/v1/dashboard/data'),
      fetch(API+'/api/v1/dashboard/feed?limit=80')
    ]);
    const data = await dataRes.json();
    const feed = await feedRes.json();

    lastData = data;
    renderStats(data);
    renderFeedPanel(feed);
    renderPatterns(data);
    renderEpisodes(data);
    renderSkills(data);
    renderStreams(data);
    renderGuidance(data);

    if(firstLoad){document.getElementById('loading').classList.add('done');firstLoad=false;}
    document.getElementById('last-update').textContent = new Date().toLocaleString('en-US',EST_FULL)+' ET';
  } catch(err) { console.error('Refresh failed:', err); }
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
